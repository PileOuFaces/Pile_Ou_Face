[tool.mypy]
python_version = "3.11"
strict = false
warn_unreachable = true
show_error_codes = true
ignore_missing_imports = true
warn_return_any = true
disallow_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = false
exclude = [
    "static/tests/",
    "venv/",
    "\\.venv/",
]

# lief ships incomplete stubs — suppress attr/assignment errors in lief-heavy modules
[[tool.mypy.overrides]]
module = ["backends.static.*"]
ignore_errors = true

[tool.ruff]
# Version Python cible (pour les règles de modernisation)
target-version = "py311"

# Longueur de ligne (88 = défaut de Black)
line-length = 88

# Dossiers à ignorer
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
]

[tool.ruff.lint]
# Règles à activer
select = [
    "E",      # Erreurs de style pycodestyle
    "F",      # Erreurs Pyflakes (variables non utilisées, etc.)
    "I",      # Tri des imports (isort)
    "B",      # Bugs potentiels (flake8-bugbear)
    "UP",     # Modernisation syntaxe (pyupgrade)
    "SIM",    # Simplifications possibles
]

# Règles à ignorer
ignore = [
    "E501",   # Ligne trop longue (géré par le formatter)
]

# Règles que --fix peut corriger automatiquement
fixable = ["ALL"]

[tool.ruff.lint.per-file-ignores]
"static/tests/*.py" = ["E402"]
"backends/static/tests/*.py" = ["E402"]

[tool.ruff.format]
# Style des guillemets (comme Black)
quote-style = "double"

# Indentation (comme Black)
indent-style = "space"
