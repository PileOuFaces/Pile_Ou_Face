name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      openvsx_mode:
        description: 'Open VSX action to run'
        required: true
        default: 'verify'
        type: choice
        options:
          - verify
          - package

permissions:
  contents: read

jobs:
  publish-marketplace:
    name: Publish VS Code Marketplace
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 0

      - name: Check tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag is not on main — publish aborted."
            exit 1
          fi

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" == *"-pre"* || "$TAG" == *"-beta"* || "$TAG" == *"-rc"* ]]; then
            npx vsce publish --pre-release --pat "$VSCE_PAT"
          else
            npx vsce publish --pat "$VSCE_PAT"
          fi
        working-directory: extension

  openvsx:
    name: Open VSX
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          fetch-depth: 0

      - name: Check tag is on main
        if: github.event_name == 'push'
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag is not on main — Open VSX publish aborted."
            exit 1
          fi

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Read extension metadata
        id: meta
        working-directory: extension
        run: |
          echo "publisher=$(node -p "require('./package.json').publisher")" >> "$GITHUB_OUTPUT"
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify Open VSX token
        if: github.event_name == 'push' || inputs.openvsx_mode == 'verify'
        working-directory: extension
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: npx ovsx verify-pat "${{ steps.meta.outputs.publisher }}" -p "$OPEN_VSX_TOKEN"

      - name: Package VSIX
        if: github.event_name == 'push' || inputs.openvsx_mode == 'package'
        working-directory: extension
        run: npx vsce package --out pile-ou-face.vsix

      - name: Upload VSIX artifact
        if: github.event_name == 'push' || inputs.openvsx_mode == 'package'
        uses: actions/upload-artifact@v4
        with:
          name: pile-ou-face-openvsx-${{ github.sha }}
          path: extension/pile-ou-face.vsix
          retention-days: 30

      - name: Publish to Open VSX
        if: github.event_name == 'push'
        working-directory: extension
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          EXTRA_ARGS=""
          if [[ "$TAG" == *"-pre"* || "$TAG" == *"-beta"* || "$TAG" == *"-rc"* ]]; then
            EXTRA_ARGS="--pre-release"
          fi
          npx ovsx publish pile-ou-face.vsix --skip-duplicate $EXTRA_ARGS -p "$OPEN_VSX_TOKEN"

      - name: Summary
        if: always()
        run: |
          {
            echo "## Open VSX"
            echo ""
            echo "- Extension: \`${{ steps.meta.outputs.publisher }}.${{ steps.meta.outputs.name }}\`"
            echo "- Version: \`${{ steps.meta.outputs.version }}\`"
            echo "- Mode: \`${{ github.event_name == 'push' && 'publish' || inputs.openvsx_mode }}\`"
            echo "- URL: https://open-vsx.org/extension/${{ steps.meta.outputs.publisher }}/${{ steps.meta.outputs.name }}"
          } >> "$GITHUB_STEP_SUMMARY"
