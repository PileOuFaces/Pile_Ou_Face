name: VSIX Artifact

on:
  push:
    branches: [main]
    paths:
      - 'extension/**'
      - '.github/workflows/vsix.yml'

permissions:
  contents: read

jobs:
  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Package VSIX
        working-directory: extension
        run: npx vsce package --out pile-ou-face.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: pile-ou-face-${{ github.sha }}
          path: extension/pile-ou-face.vsix
          retention-days: 30
