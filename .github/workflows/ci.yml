name: CI

on:
  push:
    branches-ignore: [main, develops]
    paths:
      - 'extension/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/publish.yml'
  pull_request:
    branches: [main, develops]
    paths:
      - 'extension/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/publish.yml'

permissions:
  contents: read

jobs:
  # ══════════════════════════════════════════════════════════════
  # 🔎 Lint — feature branches + PRs (une seule fois, ubuntu uniquement)
  # ══════════════════════════════════════════════════════════════
  lint:
    name: Lint
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' &&
       github.ref != 'refs/heads/main' &&
       github.ref != 'refs/heads/develops')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Ruff
        run: pip install -r extension/backends/requirements-ci.txt

      - name: Ruff check
        working-directory: ./extension
        run: python3 -m ruff check .

      - name: Ruff format
        working-directory: ./extension
        run: python3 -m ruff format --check .

  # ══════════════════════════════════════════════════════════════
  # 🔍 Tests Rapides — feature branches (push uniquement, hors main/develops)
  # ══════════════════════════════════════════════════════════════
  quick-test:
    name: Quick Test
    if: |
      github.event_name == 'push' &&
      github.ref != 'refs/heads/main' &&
      github.ref != 'refs/heads/develops'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r extension/backends/requirements-ci.txt
          cd extension && npm ci

      - name: Python tests
        working-directory: ./extension
        run: |
          python3 -m coverage erase
          python3 -m coverage run -m pytest
          python3 -m coverage report
          python3 -m coverage xml
          python3 -m coverage json -o coverage-python.json

      - name: JavaScript tests
        working-directory: ./extension
        run: npm run test:coverage

      - name: Summarize coverage
        if: always()
        working-directory: ./extension
        run: |
          mkdir -p .pile-ou-face/test-artifacts
          npm run coverage:summary > .pile-ou-face/test-artifacts/coverage-summary.log
          cat .pile-ou-face/test-artifacts/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-quick-${{ github.sha }}
          path: |
            extension/coverage-python.json
            extension/coverage.xml
            extension/coverage/
            extension/.pile-ou-face/test-artifacts/coverage-summary.md
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════════════
  # 🧪 Tests Complets Multi-OS — PRs uniquement
  # ══════════════════════════════════════════════════════════════
  full-test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20.x, 22.x]
        exclude:
          - os: macos-latest
            node: 20.x

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r extension/backends/requirements-ci.txt
          cd extension && npm ci

      - name: Python tests with coverage
        working-directory: ./extension
        run: |
          python3 -m coverage erase
          python3 -m coverage run -m pytest
          python3 -m coverage report
          python3 -m coverage xml
          python3 -m coverage json -o coverage-python.json

      - name: Bundle activation smoke test
        working-directory: ./extension
        run: npm run test:bundle

      - name: JavaScript tests with coverage
        working-directory: ./extension
        run: npm run test:coverage

      - name: Summarize coverage
        if: always()
        working-directory: ./extension
        run: |
          mkdir -p .pile-ou-face/test-artifacts
          npm run coverage:summary > .pile-ou-face/test-artifacts/coverage-summary.log
          cat .pile-ou-face/test-artifacts/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}-node-${{ matrix.node }}
          path: |
            extension/coverage-python.json
            extension/coverage.xml
            extension/coverage/
            extension/.pile-ou-face/test-artifacts/coverage-summary.md
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════════════
  # 🦄 Régressions Unicorn x86_64 — PRs uniquement, Linux
  # Le requirements-ci générique exclut Unicorn car son binding natif est
  # fragile sur macOS. Ce job dédié garde néanmoins les flux dynamiques
  # getpid/getuid/PLT protégés dans un environnement supporté et reproductible.
  # ══════════════════════════════════════════════════════════════
  dynamic-unicorn:
    name: Dynamic Unicorn Regression
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install x86_64 test toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils

      - name: Install test dependencies
        run: |
          pip install -r extension/backends/requirements-ci.txt
          pip install unicorn==2.1.4

      - name: Run libc/syscall bridge regressions
        working-directory: ./extension
        run: |
          PYTHONPATH=. python3 -m pytest \
            backends/dynamic/tests/test_libc_syscall_simulation.py \
            -q

  # ══════════════════════════════════════════════════════════════
  # 🧬 Corpus réel ARM64 — PRs uniquement, ubuntu seulement
  # ══════════════════════════════════════════════════════════════
  real-corpus-arm64:
    name: Real Corpus ARM64
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ARM64 corpus toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

      - name: Install Python dependencies
        run: pip install -r extension/backends/requirements-ci.txt

      - name: Run real binary corpus with ARM64
        working-directory: ./extension
        env:
          # clang PIE analysis on linux/x86_64 is a known open issue — tracked separately
          POF_CORPUS_SKIP_COMPILERS: "clang"
          POF_REAL_CORPUS_SUMMARY_JSON: .pile-ou-face/test-artifacts/real_binary_corpus_metrics.json
        run: |
          mkdir -p .pile-ou-face/test-artifacts
          PYTHONPATH=. python3 -m pytest backends/static/tests/test_real_binary_corpus.py -q

      - name: Upload corpus metrics
        uses: actions/upload-artifact@v4
        with:
          name: real-binary-corpus-metrics
          path: extension/.pile-ou-face/test-artifacts/real_binary_corpus_metrics.json
          if-no-files-found: error

  # ══════════════════════════════════════════════════════════════
  # 📈 E2E Runtime Audit — PRs uniquement
  # Audit runtime complet (VS Code réel) sur binaires réellement compilés
  # (corpus), avec budgets perf/mémoire BLOQUANTS. C'est le filet anti-crash :
  # une régression RSS/heap sur un vrai binaire fait échouer la CI au lieu
  # de geler VS Code chez l'utilisateur.
  # ══════════════════════════════════════════════════════════════
  e2e-runtime-audit:
    name: E2E Runtime Audit
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install corpus toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

      - name: Install dependencies
        run: |
          pip install -r extension/backends/requirements-ci.txt
          cd extension && npm ci

      # L'extension utilise backends/.venv quand il existe ; à l'activation
      # elle le crée et installe les dépendances en asynchrone — trop tard
      # pour les premiers scénarios de l'audit. Le provisionner d'avance.
      - name: Provision backend venv
        working-directory: ./extension
        run: |
          python3 -m venv backends/.venv
          backends/.venv/bin/pip install -r backends/requirements-ci.txt

      - name: Run E2E runtime audit with enforced budgets
        working-directory: ./extension
        env:
          POF_E2E_REAL_CORPUS: "1"
          POF_E2E_ENFORCE_PERF_BUDGETS: "1"
          # Runners CI lents : budgets de durée relâchés. Les budgets mémoire
          # (heap/RSS) gardent leurs valeurs par défaut — ce sont eux le filet.
          POF_E2E_BUDGET_SCENARIO_DURATION_WARN_MS: "4000"
          POF_E2E_BUDGET_SCENARIO_DURATION_FAIL_MS: "10000"
          POF_E2E_BUDGET_BACKEND_SCENARIO_TOTAL_WARN_MS: "1500"
          POF_E2E_BUDGET_BACKEND_SCENARIO_TOTAL_FAIL_MS: "4000"
          POF_E2E_BUDGET_BACKEND_GLOBAL_TOTAL_WARN_MS: "12000"
          POF_E2E_BUDGET_BACKEND_GLOBAL_TOTAL_FAIL_MS: "30000"
        run: xvfb-run -a npm run test:e2e:audit

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-runtime-audit-reports
          path: |
            extension/.pile-ou-face/test-artifacts/e2e-runtime-audit/runtime-audit-workflow-report.md
            extension/.pile-ou-face/test-artifacts/e2e-runtime-audit/runtime-audit-workflow-report.json
            extension/.pile-ou-face/test-artifacts/e2e-runtime-audit/runtime-audit-feature-coverage.md
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════════════
  # 🔐 Security Scan — PRs uniquement, ubuntu seulement
  # Séparé de full-test pour ne pas bloquer les tests si l'audit échoue
  # ══════════════════════════════════════════════════════════════
  security-scan:
    name: Security Scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r extension/backends/requirements-ci.txt pip-audit
          cd extension && npm ci

      - name: npm audit
        working-directory: ./extension
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: pip-audit (Python deps)
        run: pip-audit --desc
        continue-on-error: true

      - name: Check outdated npm packages
        working-directory: ./extension
        run: npm outdated || true
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════
  # 🔑 Auth Licensing Interop E2E — PRs uniquement, filtré par chemin
  # Test réel host<->auth (XSYNC-LIC-001, Pile_Ou_Face#70) : démarre un vrai
  # serveur Pile_ou_Face_auth (repo privé, sibling) et fait dialoguer le vrai
  # AuthService avec lui. Ne tourne que si un fichier pertinent a changé (pas
  # de sens à répéter ce test pour une PR qui ne touche pas ce chemin) — voir
  # extension/scripts/e2e/authLicensingInteropE2E.js pour ce que ça couvre.
  #
  # Nécessite un PAT en lecture seule sur Pile_ou_Face_auth stocké dans le
  # secret AUTH_REPO_READONLY_PAT de CE repo (Settings > Secrets and
  # variables > Actions). Absent : le job est ignoré avec un avertissement
  # plutôt que d'échouer silencieusement ou de bloquer les PRs.
  # ══════════════════════════════════════════════════════════════
  auth-licensing-e2e:
    name: Auth Licensing Interop E2E
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect relevant changes
        id: filter
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=50
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
              | grep -qE '^extension/(src/shared/(authService|deviceLicensing)\.ts|scripts/e2e/authLicensingInteropE2E\.js|package(-lock)?\.json)$'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      # La condition ne peut pas référencer `secrets` directement dans un `if:`
      # (context non disponible à cet endroit) — on le teste ici et on
      # propage le résultat via un output de step, seul context garanti
      # disponible dans les `if:` suivants.
      - name: Check secret configured
        id: secret_check
        env:
          AUTH_REPO_READONLY_PAT: ${{ secrets.AUTH_REPO_READONLY_PAT }}
        run: |
          if [ -n "$AUTH_REPO_READONLY_PAT" ]; then
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report missing secret
        if: steps.filter.outputs.relevant == 'true' && steps.secret_check.outputs.has_pat == 'false'
        run: echo "::warning::AUTH_REPO_READONLY_PAT non configuré — interop e2e ignoré pour cette PR malgré un changement pertinent."

      - name: Setup Node.js
        if: steps.filter.outputs.relevant == 'true' && steps.secret_check.outputs.has_pat == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Setup Python
        if: steps.filter.outputs.relevant == 'true' && steps.secret_check.outputs.has_pat == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout sibling auth repo
        if: steps.filter.outputs.relevant == 'true' && steps.secret_check.outputs.has_pat == 'true'
        uses: actions/checkout@v5
        with:
          repository: PileOuFaces/Pile_ou_Face_auth
          token: ${{ secrets.AUTH_REPO_READONLY_PAT }}
          path: pof-auth-sibling

      - name: Install dependencies
        if: steps.filter.outputs.relevant == 'true' && steps.secret_check.outputs.has_pat == 'true'
        run: |
          python3 -m venv pof-auth-sibling/.venv
          pof-auth-sibling/.venv/bin/pip install -e ./pof-auth-sibling
          cd extension && npm ci

      - name: Run real host<->auth interop e2e
        if: steps.filter.outputs.relevant == 'true' && steps.secret_check.outputs.has_pat == 'true'
        working-directory: ./extension
        env:
          AUTH_REPO_PATH: ${{ github.workspace }}/pof-auth-sibling
        run: npm run test:e2e:auth-licensing

  # ══════════════════════════════════════════════════════════════
  # ✅ Status Check — required check pour les PRs et les pushs
  # ══════════════════════════════════════════════════════════════
  ci-success:
    name: CI Success
    if: always()
    needs: [lint, quick-test, full-test, dynamic-unicorn, real-corpus-arm64, e2e-runtime-audit, security-scan, auth-licensing-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        shell: bash
        run: |
          LINT="${{ needs.lint.result }}"
          QUICK="${{ needs.quick-test.result }}"
          FULL="${{ needs.full-test.result }}"
          DYNAMIC_UNICORN="${{ needs.dynamic-unicorn.result }}"
          REAL_CORPUS="${{ needs.real-corpus-arm64.result }}"
          E2E_AUDIT="${{ needs.e2e-runtime-audit.result }}"
          SECURITY="${{ needs.security-scan.result }}"
          AUTH_LICENSING_E2E="${{ needs.auth-licensing-e2e.result }}"

          echo "Event      : ${{ github.event_name }}"
          echo "Lint       : $LINT"
          echo "Quick test : $QUICK"
          echo "Full test  : $FULL"
          echo "Unicorn    : $DYNAMIC_UNICORN"
          echo "Corpus ARM : $REAL_CORPUS"
          echo "E2E Audit  : $E2E_AUDIT"
          echo "Security   : $SECURITY"
          echo "Auth E2E   : $AUTH_LICENSING_E2E"

          fail_if_bad() {
            if [[ "$1" == "failure" || "$1" == "cancelled" ]]; then
              echo "❌ $2 failed" && exit 1
            fi
          }

          if [[ "${{ github.event_name }}" == "push" ]]; then
            fail_if_bad "$LINT" "Lint"
            fail_if_bad "$QUICK" "Quick test"
            echo "✅ Push checks passed (lint=$LINT, quick=$QUICK)"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            fail_if_bad "$LINT" "Lint"
            fail_if_bad "$FULL" "Full test"
            fail_if_bad "$DYNAMIC_UNICORN" "Dynamic Unicorn Regression"
            fail_if_bad "$REAL_CORPUS" "Real Corpus ARM64"
            fail_if_bad "$E2E_AUDIT" "E2E Runtime Audit"
            # auth-licensing-e2e est filtré par chemin : "skipped" n'existe pas
            # en pratique tant que le job lui-même s'exécute (if: pull_request),
            # seuls ses steps internes sont conditionnels — pas de check "not
            # skipped" ici, contrairement aux jobs ci-dessus qui tournent toujours.
            fail_if_bad "$AUTH_LICENSING_E2E" "Auth Licensing Interop E2E"
            # security-scan est informatif uniquement (continue-on-error sur tous ses steps)
            if [[ "$LINT" == "skipped" ]]; then
              echo "❌ Lint was skipped on a PR — check workflow conditions"
              exit 1
            fi
            if [[ "$FULL" == "skipped" ]]; then
              echo "❌ Full test was skipped on a PR — check workflow conditions"
              exit 1
            fi
            if [[ "$DYNAMIC_UNICORN" == "skipped" ]]; then
              echo "❌ Dynamic Unicorn Regression was skipped on a PR — check workflow conditions"
              exit 1
            fi
            if [[ "$REAL_CORPUS" == "skipped" ]]; then
              echo "❌ Real Corpus ARM64 was skipped on a PR — check workflow conditions"
              exit 1
            fi
            if [[ "$E2E_AUDIT" == "skipped" ]]; then
              echo "❌ E2E Runtime Audit was skipped on a PR — check workflow conditions"
              exit 1
            fi
            echo "✅ PR checks passed (lint=$LINT, full=$FULL, unicorn=$DYNAMIC_UNICORN, real-corpus-arm64=$REAL_CORPUS, security=$SECURITY, auth-licensing-e2e=$AUTH_LICENSING_E2E)"
            exit 0
          fi

          echo "❌ Unexpected event: ${{ github.event_name }}" && exit 1
