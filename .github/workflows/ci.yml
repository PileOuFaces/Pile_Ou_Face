name: CI

on:
  pull_request:
    branches: [main, develops]
    paths:
      - 'extension/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/publish.yml'

permissions:
  contents: read

# Un nouveau push (ou une nouvelle synchro de PR) annule le run précédent
# encore en cours sur la même ref — sans ça, chaque commit successif laisse
# tourner à fond les runs déjà obsolètes en plus du nouveau.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════════
  # 🔎 Lint — PRs (une seule fois, ubuntu uniquement)
  # ══════════════════════════════════════════════════════════════
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Ruff
        run: pip install -r extension/backends/requirements-ci.txt

      - name: Ruff check
        working-directory: ./extension
        run: python3 -m ruff check .

      - name: Ruff format
        working-directory: ./extension
        run: python3 -m ruff format --check .

  # ══════════════════════════════════════════════════════════════
  # 🧪 Tests Complets Multi-OS — PRs uniquement
  # ══════════════════════════════════════════════════════════════
  full-test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20.x, 22.x]
        exclude:
          - os: macos-latest
            node: 20.x

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r extension/backends/requirements-ci.txt
          cd extension && npm ci

      - name: Python tests with coverage
        working-directory: ./extension
        run: |
          python3 -m coverage erase
          python3 -m coverage run -m pytest
          python3 -m coverage report
          python3 -m coverage xml
          python3 -m coverage json -o coverage-python.json

      - name: Bundle activation smoke test
        working-directory: ./extension
        run: npm run test:bundle

      - name: JavaScript tests with coverage
        working-directory: ./extension
        run: npm run test:coverage

      - name: Summarize coverage
        if: always()
        working-directory: ./extension
        run: |
          mkdir -p .pile-ou-face/test-artifacts
          npm run coverage:summary > .pile-ou-face/test-artifacts/coverage-summary.log
          cat .pile-ou-face/test-artifacts/coverage-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}-node-${{ matrix.node }}
          path: |
            extension/coverage-python.json
            extension/coverage.xml
            extension/coverage/
            extension/.pile-ou-face/test-artifacts/coverage-summary.md
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════════════
  # 🪟 Auth Licensing Windows Unit Tests — PRs uniquement, filtré par chemin
  # DoD XSYNC-LIC-001 (Pile_Ou_Face#70) exige une couverture Windows pour
  # l'agent de licence par installation. Job dédié et léger (juste les specs
  # concernées, pas toute la suite Python+JS) plutôt qu'ajouter windows-latest
  # à la matrice `full-test` : le backend Python a des hypothèses Unix
  # (compilateurs, subprocess) sans rapport avec ce chemin, les y exposer
  # casserait `full-test` sur des bases qui n'ont rien à voir avec l'auth.
  # ══════════════════════════════════════════════════════════════
  auth-licensing-windows:
    name: Auth Licensing Windows Unit Tests
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          filters: |
            relevant:
              - 'extension/src/shared/authService.ts'
              - 'extension/src/shared/deviceLicensing.ts'
              - 'extension/src/tests/authService.test.ts'
              - 'extension/src/tests/deviceLicensing.test.ts'

      - name: Checkout
        if: steps.filter.outputs.relevant == 'true'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: steps.filter.outputs.relevant == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        if: steps.filter.outputs.relevant == 'true'
        working-directory: ./extension
        run: npm ci

      - name: Run authService/deviceLicensing tests on Windows
        if: steps.filter.outputs.relevant == 'true'
        working-directory: ./extension
        shell: bash
        # node_modules/.bin/_mocha est le shim POSIX généré par npm ; sur
        # windows-latest le shell par défaut (pwsh) le passe tel quel à tsx,
        # qui essaie de le parser comme du JS et échoue ("missing ) after
        # argument list" — c'est le script shell, pas le vrai fichier JS).
        # On force bash (git-bash, présent sur windows-latest) et on pointe
        # directement sur le vrai fichier pour éviter le shim.
        run: npx tsx node_modules/mocha/bin/_mocha "src/tests/authService.test.ts" "src/tests/deviceLicensing.test.ts" --require src/tests/setup.ts --exit

  # ══════════════════════════════════════════════════════════════
  # 🦄 Régressions Unicorn x86_64 — PRs uniquement, Linux
  # Le requirements-ci générique exclut Unicorn car son binding natif est
  # fragile sur macOS. Ce job dédié garde néanmoins les flux dynamiques
  # getpid/getuid/PLT protégés dans un environnement supporté et reproductible.
  # ══════════════════════════════════════════════════════════════
  dynamic-unicorn:
    name: Dynamic Unicorn Regression
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          filters: |
            relevant:
              - 'extension/backends/dynamic/**'
              - 'extension/backends/requirements-ci.txt'

      - name: Checkout
        if: steps.filter.outputs.relevant == 'true'
        uses: actions/checkout@v5

      - name: Setup Python
        if: steps.filter.outputs.relevant == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install x86_64 test toolchain
        if: steps.filter.outputs.relevant == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils

      - name: Install test dependencies
        if: steps.filter.outputs.relevant == 'true'
        run: |
          pip install -r extension/backends/requirements-ci.txt
          pip install unicorn==2.1.4

      - name: Run libc/syscall bridge regressions
        if: steps.filter.outputs.relevant == 'true'
        working-directory: ./extension
        run: |
          PYTHONPATH=. python3 -m pytest \
            backends/dynamic/tests/test_libc_syscall_simulation.py \
            -q

  # ══════════════════════════════════════════════════════════════
  # 🧬 Corpus réel ARM64 — PRs uniquement, ubuntu seulement
  # ══════════════════════════════════════════════════════════════
  real-corpus-arm64:
    name: Real Corpus ARM64
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          filters: |
            relevant:
              - 'extension/backends/static/**'
              - 'extension/backends/requirements-ci.txt'

      - name: Checkout
        if: steps.filter.outputs.relevant == 'true'
        uses: actions/checkout@v5

      - name: Setup Python
        if: steps.filter.outputs.relevant == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ARM64 corpus toolchain
        if: steps.filter.outputs.relevant == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

      - name: Install Python dependencies
        if: steps.filter.outputs.relevant == 'true'
        run: pip install -r extension/backends/requirements-ci.txt

      - name: Run real binary corpus with ARM64
        if: steps.filter.outputs.relevant == 'true'
        working-directory: ./extension
        env:
          # clang PIE analysis on linux/x86_64 is a known open issue — tracked separately
          POF_CORPUS_SKIP_COMPILERS: "clang"
          POF_REAL_CORPUS_SUMMARY_JSON: .pile-ou-face/test-artifacts/real_binary_corpus_metrics.json
        run: |
          mkdir -p .pile-ou-face/test-artifacts
          PYTHONPATH=. python3 -m pytest backends/static/tests/test_real_binary_corpus.py -q

      - name: Upload corpus metrics
        if: steps.filter.outputs.relevant == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: real-binary-corpus-metrics
          path: extension/.pile-ou-face/test-artifacts/real_binary_corpus_metrics.json
          if-no-files-found: error

  # ══════════════════════════════════════════════════════════════
  # 📈 E2E Runtime Audit — PRs uniquement
  # Audit runtime complet (VS Code réel) sur binaires réellement compilés
  # (corpus), avec budgets perf/mémoire BLOQUANTS. C'est le filet anti-crash :
  # une régression RSS/heap sur un vrai binaire fait échouer la CI au lieu
  # de geler VS Code chez l'utilisateur.
  # ══════════════════════════════════════════════════════════════
  e2e-runtime-audit:
    name: E2E Runtime Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install corpus toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu

      - name: Install dependencies
        run: |
          pip install -r extension/backends/requirements-ci.txt
          cd extension && npm ci

      # L'extension utilise backends/.venv quand il existe ; à l'activation
      # elle le crée et installe les dépendances en asynchrone — trop tard
      # pour les premiers scénarios de l'audit. Le provisionner d'avance.
      - name: Provision backend venv
        working-directory: ./extension
        run: |
          python3 -m venv backends/.venv
          backends/.venv/bin/pip install -r backends/requirements-ci.txt

      - name: Run E2E runtime audit with enforced budgets
        working-directory: ./extension
        env:
          POF_E2E_REAL_CORPUS: "1"
          POF_E2E_ENFORCE_PERF_BUDGETS: "1"
          # Runners CI lents : budgets de durée relâchés. Les budgets mémoire
          # (heap/RSS) gardent leurs valeurs par défaut — ce sont eux le filet.
          POF_E2E_BUDGET_SCENARIO_DURATION_WARN_MS: "4000"
          POF_E2E_BUDGET_SCENARIO_DURATION_FAIL_MS: "10000"
          POF_E2E_BUDGET_BACKEND_SCENARIO_TOTAL_WARN_MS: "1500"
          POF_E2E_BUDGET_BACKEND_SCENARIO_TOTAL_FAIL_MS: "4000"
          POF_E2E_BUDGET_BACKEND_GLOBAL_TOTAL_WARN_MS: "12000"
          POF_E2E_BUDGET_BACKEND_GLOBAL_TOTAL_FAIL_MS: "30000"
        run: xvfb-run -a npm run test:e2e:audit

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-runtime-audit-reports
          path: |
            extension/.pile-ou-face/test-artifacts/e2e-runtime-audit/runtime-audit-workflow-report.md
            extension/.pile-ou-face/test-artifacts/e2e-runtime-audit/runtime-audit-workflow-report.json
            extension/.pile-ou-face/test-artifacts/e2e-runtime-audit/runtime-audit-feature-coverage.md
          if-no-files-found: warn

  # ══════════════════════════════════════════════════════════════
  # 🔐 Security Scan — PRs uniquement, ubuntu seulement
  # Séparé de full-test pour ne pas bloquer les tests si l'audit échoue
  # ══════════════════════════════════════════════════════════════
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # security-scan audite les dépendances installées, pas le code — inutile
      # de le relancer si aucun manifeste de dépendances n'a bougé.
      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          filters: |
            relevant:
              - 'extension/package.json'
              - 'extension/package-lock.json'
              - 'extension/backends/requirements-ci.txt'
              - 'extension/backends/**/requirements*.txt'

      - name: Checkout
        if: steps.filter.outputs.relevant == 'true'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: steps.filter.outputs.relevant == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Setup Python
        if: steps.filter.outputs.relevant == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.filter.outputs.relevant == 'true'
        run: |
          pip install -r extension/backends/requirements-ci.txt pip-audit
          cd extension && npm ci

      - name: npm audit
        if: steps.filter.outputs.relevant == 'true'
        working-directory: ./extension
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: pip-audit (Python deps)
        if: steps.filter.outputs.relevant == 'true'
        run: pip-audit --desc
        continue-on-error: true

      - name: Check outdated npm packages
        if: steps.filter.outputs.relevant == 'true'
        working-directory: ./extension
        run: npm outdated || true
        continue-on-error: true

  # ══════════════════════════════════════════════════════════════
  # 🔑 Auth Licensing Interop E2E — toutes les PRs couvertes par cette CI
  # Test réel host<->auth (XSYNC-LIC-001, Pile_Ou_Face#70) : démarre un vrai
  # serveur Pile_ou_Face_auth (repo privé, sibling) et fait dialoguer le vrai
  # AuthService avec lui. Il tourne sur chaque PR qui déclenche ci.yml : une
  # régression indirecte (bundling, dépendances, runtime, stockage) peut casser
  # le licensing même sans modifier directement authService.ts.
  #
  # Nécessite un PAT en lecture seule sur Pile_ou_Face_auth stocké dans le
  # secret CROSS_REPO_READONLY_PAT de CE repo (Settings > Secrets and
  # variables > Actions). Absent : le job échoue fermé ; un succès sans avoir
  # exécuté l'interop réel serait un faux vert.
  # ══════════════════════════════════════════════════════════════
  auth-licensing-e2e:
    name: Auth Licensing Interop E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      # La condition ne peut pas référencer `secrets` directement dans un `if:`
      # (context non disponible à cet endroit) — on le teste ici et on
      # propage le résultat via un output de step, seul context garanti
      # disponible dans les `if:` suivants.
      - name: Check secret configured
        id: secret_check
        env:
          CROSS_REPO_READONLY_PAT: ${{ secrets.CROSS_REPO_READONLY_PAT }}
        run: |
          if [ -n "$CROSS_REPO_READONLY_PAT" ]; then
            echo "has_pat=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_pat=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Require Auth checkout capability
        if: steps.secret_check.outputs.has_pat == 'false'
        run: |
          echo "::error::CROSS_REPO_READONLY_PAT non configuré — impossible d'exécuter l'interop Host↔Auth↔Plugins obligatoire."
          exit 1

      - name: Setup Node.js
        if: steps.secret_check.outputs.has_pat == 'true'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Setup Python
        if: steps.secret_check.outputs.has_pat == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Checkout sibling auth repo
        if: steps.secret_check.outputs.has_pat == 'true'
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          repository: PileOuFaces/Pile_ou_Face_auth
          # `develops` est la branche de dev active de ce repo (voir CLAUDE.md
          # racine du workspace) — `main` (défaut du checkout sans `ref:`) est
          # la branche production, mise à jour seulement lors d'une release.
          # Sans ce `ref:`, ce job teste une version de l'auth potentiellement
          # bien en retard sur ce qui est réellement mergé.
          ref: develops
          token: ${{ secrets.CROSS_REPO_READONLY_PAT }}
          path: pof-auth-sibling

      - name: Checkout sibling plugins repo
        if: steps.secret_check.outputs.has_pat == 'true'
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          repository: PileOuFaces/Pile_ou_Face_plugins
          ref: develops
          token: ${{ secrets.CROSS_REPO_READONLY_PAT }}
          path: pof-plugins-sibling

      - name: Cache pip downloads (auth-sibling deps)
        if: steps.secret_check.outputs.has_pat == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          # La liste de dépendances est inline dans ce fichier (pas de
          # requirements.txt côté sibling, cf. commentaire ci-dessous) — la
          # hasher directement invalide le cache dès qu'elle change ici.
          key: auth-e2e-pip-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            auth-e2e-pip-${{ runner.os }}-

      - name: Install dependencies
        if: steps.secret_check.outputs.has_pat == 'true'
        run: |
          python3 -m venv pof-auth-sibling/.venv
          # Installe les dépendances runtime directement plutôt que `pip install -e .` :
          # le pyproject.toml de Pile_ou_Face_auth a un layout plat (k8s/, alembic/, app/
          # au même niveau) qui déclenche l'heuristique setuptools "multiple top-level
          # packages" selon la version de setuptools récupérée par l'isolation de build
          # (non pinnée côté auth) — marche localement, casse en CI de façon non
          # déterministe. Pas besoin d'installer `app` comme paquet : uvicorn tourne
          # avec le repo en CWD (working-directory ci-dessous), comme les tests du
          # repo auth le font déjà. Garder cette liste synchronisée avec
          # pof-auth-sibling/pyproject.toml si ses dépendances changent.
          pof-auth-sibling/.venv/bin/pip install \
            'fastapi>=0.111' 'uvicorn[standard]>=0.29' 'sqlalchemy>=2.0' 'alembic>=1.13' \
            'psycopg2-binary>=2.9' 'pydantic-settings>=2.2' 'pydantic[email]>=2.7' \
            'python-jose[cryptography]>=3.3' 'passlib[bcrypt]>=1.7' 'bcrypt<4.1' 'slowapi>=0.1.9'
          pof-auth-sibling/.venv/bin/pip install -e './pof-plugins-sibling[dev]'
          cd pof-plugins-sibling
          npm ci
          npm run build:webviews
          cd ..
          cd extension && npm ci

      - name: Run real host<->auth interop e2e
        if: steps.secret_check.outputs.has_pat == 'true'
        working-directory: ./extension
        env:
          AUTH_REPO_PATH: ${{ github.workspace }}/pof-auth-sibling
          PLUGINS_REPO_PATH: ${{ github.workspace }}/pof-plugins-sibling
        run: npm run test:e2e:auth-licensing

  # ══════════════════════════════════════════════════════════════
  # ✅ Status Check — required check pour les PRs
  # ══════════════════════════════════════════════════════════════
  ci-success:
    name: CI Success
    if: always()
    needs: [lint, full-test, dynamic-unicorn, real-corpus-arm64, e2e-runtime-audit, security-scan, auth-licensing-e2e, auth-licensing-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check results
        shell: bash
        run: |
          LINT="${{ needs.lint.result }}"
          FULL="${{ needs.full-test.result }}"
          DYNAMIC_UNICORN="${{ needs.dynamic-unicorn.result }}"
          REAL_CORPUS="${{ needs.real-corpus-arm64.result }}"
          E2E_AUDIT="${{ needs.e2e-runtime-audit.result }}"
          SECURITY="${{ needs.security-scan.result }}"
          AUTH_LICENSING_E2E="${{ needs.auth-licensing-e2e.result }}"
          AUTH_LICENSING_WINDOWS="${{ needs.auth-licensing-windows.result }}"

          echo "Lint       : $LINT"
          echo "Full test  : $FULL"
          echo "Unicorn    : $DYNAMIC_UNICORN"
          echo "Corpus ARM : $REAL_CORPUS"
          echo "E2E Audit  : $E2E_AUDIT"
          echo "Security   : $SECURITY"
          echo "Auth Win   : $AUTH_LICENSING_WINDOWS"
          echo "Auth E2E   : $AUTH_LICENSING_E2E"

          fail_if_bad() {
            if [[ "$1" == "failure" || "$1" == "cancelled" || "$1" == "skipped" ]]; then
              echo "❌ $2 failed or was skipped — check workflow conditions" && exit 1
            fi
          }

          fail_if_bad "$LINT" "Lint"
          fail_if_bad "$FULL" "Full test"
          fail_if_bad "$DYNAMIC_UNICORN" "Dynamic Unicorn Regression"
          fail_if_bad "$REAL_CORPUS" "Real Corpus ARM64"
          fail_if_bad "$E2E_AUDIT" "E2E Runtime Audit"
          fail_if_bad "$AUTH_LICENSING_E2E" "Auth Licensing Interop E2E"
          fail_if_bad "$AUTH_LICENSING_WINDOWS" "Auth Licensing Windows Unit Tests"
          # security-scan est informatif uniquement (continue-on-error sur tous ses steps)
          echo "✅ PR checks passed (lint=$LINT, full=$FULL, unicorn=$DYNAMIC_UNICORN, real-corpus-arm64=$REAL_CORPUS, security=$SECURITY, auth-licensing-e2e=$AUTH_LICENSING_E2E, auth-licensing-windows=$AUTH_LICENSING_WINDOWS)"
