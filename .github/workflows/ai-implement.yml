name: AI — Implement ticket

# Déclenché par Azure DevOps via dispatch-to-github.yml (Azure Pipeline)
# Payload attendu :
#   work_item_id   : ID du ticket AzDO (ex: 42)
#   title          : titre du ticket
#   description    : description complète
#   acceptance     : critères d'acceptation
#   repo           : nom du repo GitHub cible (ex: Pile_Ou_Face)
#   area           : zone fonctionnelle (ex: extension, backends, docker)

on:
  repository_dispatch:
    types: [azdo-ticket-active]

permissions:
  contents: write
  pull-requests: write

jobs:
  implement:
    runs-on: ubuntu-latest

    env:
      AZ_ID: ${{ github.event.client_payload.work_item_id }}
      AZ_TITLE: ${{ github.event.client_payload.title }}
      AZ_DESCRIPTION: ${{ github.event.client_payload.description }}
      AZ_ACCEPTANCE: ${{ github.event.client_payload.acceptance }}
      AZ_AREA: ${{ github.event.client_payload.area }}

    steps:
      - name: Checkout develops
        uses: actions/checkout@v4
        with:
          ref: develops
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Create feature branch
        id: branch
        run: |
          SLUG=$(echo "$AZ_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//' \
            | cut -c1-40)
          BRANCH="feature/AZ-${AZ_ID}-${SLUG}"
          git checkout -b "$BRANCH"
          git config user.name "Claude Code Bot"
          git config user.email "claude-bot@pile-ou-face.dev"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Write ticket context file
        run: |
          cat > /tmp/ticket.md <<EOF
          # Ticket AZ-#${AZ_ID}

          **Titre:** ${AZ_TITLE}

          **Description:**
          ${AZ_DESCRIPTION}

          **Critères d'acceptation:**
          ${AZ_ACCEPTANCE}

          **Zone fonctionnelle:** ${AZ_AREA}
          EOF

      - name: Run Claude Code — implement ticket
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GIT_AUTHOR_NAME: "Claude Code Bot"
          GIT_AUTHOR_EMAIL: "claude-bot@pile-ou-face.dev"
        run: |
          PROMPT="$(cat <<'PROMPT'
          Tu implémentes le ticket Azure DevOps décrit dans /tmp/ticket.md.

          Instructions :
          1. Lis /tmp/ticket.md pour le contexte complet.
          2. Lis CLAUDE.md si présent pour les conventions du repo.
          3. Implémente la tâche en respectant le style existant.
          4. Écris les tests correspondants.
          5. Committe avec le format : feat: <titre> (AZ-#ID)
          6. Ne touche qu'aux fichiers nécessaires — pas de refactor hors scope.
          PROMPT
          )"
          claude --print \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,TodoWrite" \
            --max-turns 40 \
            "$PROMPT"

      - name: Push branch
        run: git push origin "${{ steps.branch.outputs.name }}"

      - name: Write PR body
        run: |
          cat > /tmp/pr-body.md <<EOF
          ## Ticket Azure DevOps AZ-#${AZ_ID}

          **${AZ_TITLE}**

          ${AZ_DESCRIPTION}

          **Critères d'acceptation :**
          ${AZ_ACCEPTANCE}

          ---
          _Implémenté automatiquement par Claude Code — review requis avant merge._
          EOF

      - name: Open PR → develops
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          gh pr create \
            --base develops \
            --head "$BRANCH" \
            --title "feat: ${AZ_TITLE} (AZ-#${AZ_ID})" \
            --body-file /tmp/pr-body.md \
            --label "ai-generated"
